<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 3D Memories</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- 开场覆盖层 -->
    <div id="intro-overlay">
        <div class="intro-stars"></div>
        <div class="intro-content">
            <div class="intro-subtitle">✨ FOR MY LOVE ✨</div>
            <div class="intro-title">🐟<br>烤鱼happy碎片</div>
            <div class="intro-divider"></div>
            <button id="btn-start" class="premium-btn intro-btn">鱼已就绪</button>
        </div>
    </div>

    <!-- 过渡黑屏 -->
    <div id="transition-screen"></div>

    <!-- 吹蜡烛界面 -->
    <div id="cake-overlay">
        <div id="cake-container">
            <canvas id="cake-canvas"></canvas>
            <div id="cake-ui-layer">
                <h2 id="cake-status-text">正在加载...</h2>
            </div>
            <button id="btn-enter-heart" class="premium-btn">进入回忆</button>
        </div>
    </div>

    <div id="loading-overlay">
        <canvas id="loading-canvas"></canvas>
        <div class="loading-center">
            <div class="loading-ring">
                <svg viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ffb6c1" />
                            <stop offset="50%" stop-color="#ff6b8a" />
                            <stop offset="100%" stop-color="#b76e79" />
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="50" cy="50" r="44" />
                    <circle class="ring-fill" cx="50" cy="50" r="44" id="loading-ring-fill" />
                </svg>
            </div>
            <div class="loading-heart">💗</div>
            <div class="loading-percent" id="loading-percent">0%</div>
            <div class="loading-subtitle">拼凑烤鱼碎片…</div>
            <div class="loading-carousel" id="loading-carousel">
                <span id="loading-carousel-text">金风玉露一相逢，便胜却人间无数 ✨</span>
            </div>
        </div>
    </div>

    <video id="input_video" style="display:none;"></video>
    <div id="camera-heart" class="camera-heart">
        <video id="camera-preview" autoplay playsinline></video>
    </div>

    <!-- 纪念日倒计时 -->
    <div id="days-counter">
        <span id="days-number">0</span>
        <span id="days-label">DAYS</span>
        <span id="days-subtitle">双子星的运行周期</span>
    </div>

    <!-- 音乐控制 -->
    <button id="btn-music" class="premium-btn music-btn" title="播放/暂停音乐">♪</button>
    <button id="btn-fullscreen" class="premium-btn fullscreen-btn" title="全屏">⛶</button>
    <audio id="bg-music" loop preload="auto"></audio>

    <!-- 照片备注 -->
    <div id="photo-caption" class="hidden"></div>

    <!-- 照片7/20/34锁定覆盖层 -->
    <div id="photo-lock-overlay" class="hidden">
        <div class="lock-icon">🔒</div>
        <div class="lock-hint-primary" id="lock-hint-primary"></div>
        <div class="lock-hint-secondary" id="lock-hint-secondary">左手比「✌️」  右手握「👊」</div>
        <div class="lock-sub">解锁隐藏回忆</div>
        <button id="btn-skip-lock" class="premium-btn lock-skip-btn hidden">跳过，继续浏览 →</button>
    </div>

    <!-- 视频播放遮罩 -->
    <div id="video-overlay" class="hidden">
        <div class="video-backdrop"></div>
        <div class="video-container">
            <button id="btn-close-video" class="premium-btn video-close-btn">✕</button>
            <video id="memory-video" controls playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="gallery-ui" class="hidden">
        <button id="btn-prev" class="premium-btn nav-btn">⟵</button>
        <button id="btn-exit" class="premium-btn">返回爱心</button>
        <button id="btn-next" class="premium-btn nav-btn">⟶</button>
    </div>
    <button id="btn-play-video" class="premium-btn video-btn hidden">🎬 播放我们的故事</button>
    <div id="gallery-swipe-hint" class="hidden">
        <span class="gesture-icon">👋</span>
        <span class="gesture-text">挥动手掌，切换照片</span>
    </div>
    <button id="btn-enter-gallery" class="premium-btn floating-btn">浏览回忆</button>

    <!-- 手势提示 -->
    <div id="gesture-hint">
        <span class="gesture-icon">🖐️</span>
        <span class="gesture-text">张开手掌，引爆回忆</span>
    </div>

    <!-- 握拳收回提示 -->
    <div id="fist-hint">
        <span class="gesture-icon">👊</span>
        <span class="gesture-text">握紧拳头，重聚爱心</span>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
